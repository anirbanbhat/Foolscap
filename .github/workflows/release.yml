name: Release

# Fires on:
#   - push to `main`  → tests pass, then a new minor version is cut
#                       automatically (v0.1.0 → v0.2.0 → v0.3.0 …)
#   - tag push `v*`   → cut a release at that exact tag
#   - manual dispatch → cut a release at the version you pass in
#
# To skip auto-release on a particular main commit, include `[skip release]`
# anywhere in the commit message.

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0). Leave blank to auto-bump the minor.'
        required: false
        default: ''

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Select Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)/Contents/Developer"
          swift --version

      - name: Run tests
        run: ./test.sh

  release:
    needs: test
    if: |
      !contains(github.event.head_commit.message, '[skip release]')
      && (
        (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))
        || github.event_name == 'workflow_dispatch'
      )
    runs-on: macos-latest

    permissions:
      contents: write   # Needed to create a GitHub release and upload assets.

    steps:
      - name: Check out source (full history for tag lookup)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)/Contents/Developer"
          swift --version

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          case "${GITHUB_EVENT_NAME}" in
            workflow_dispatch)
              IN="${{ github.event.inputs.version }}"
              if [ -n "${IN}" ]; then
                VERSION="${IN}"
              else
                VERSION="$(./.github/scripts/next-minor.sh)"
              fi
              ;;
            push)
              if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
                VERSION="${GITHUB_REF_NAME}"
              else
                VERSION="$(./.github/scripts/next-minor.sh)"
              fi
              ;;
            *)
              echo "Unsupported event: ${GITHUB_EVENT_NAME}" >&2
              exit 1
              ;;
          esac
          echo "Resolved version: ${VERSION}"
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build app
        run: ./build.sh

      - name: Stage .dmg contents
        run: |
          set -euo pipefail
          rm -rf dmg-staging
          mkdir -p dmg-staging
          cp -R build/foolscap.app "dmg-staging/Foolscap.app"
          ln -s /Applications dmg-staging/Applications

      - name: Create .dmg
        id: dmg
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.tag }}"
          DMG_NAME="Foolscap-${VERSION}.dmg"
          hdiutil create \
            -volname "Foolscap" \
            -srcfolder dmg-staging \
            -ov \
            -format UDZO \
            "${DMG_NAME}"
          shasum -a 256 "${DMG_NAME}" | tee "${DMG_NAME}.sha256"
          echo "dmg_name=${DMG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Write release notes
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          DMG_NAME="${{ steps.dmg.outputs.dmg_name }}"
          {
            echo "# Foolscap ${VERSION}"
            echo
            echo "Native macOS text and code editor in the spirit of Notepad++ — pure AppKit/Swift, no Electron."
            echo
            echo "## Install"
            echo
            echo "1. Download \`${DMG_NAME}\` below."
            echo "2. Open the disk image and drag **Foolscap.app** into your **Applications** folder."
            echo "3. On first launch macOS may say the app is from an unidentified developer. Right-click the app and choose **Open**, or run:"
            echo
            echo "   \`\`\`sh"
            echo "   xattr -dr com.apple.quarantine /Applications/Foolscap.app"
            echo "   \`\`\`"
            echo
            echo "The build is ad-hoc signed only — it is not notarized. Apple's Gatekeeper warning is expected until/unless the app is signed with a paid Developer ID."
            echo
            echo "## Verify the download"
            echo
            echo "\`\`\`sh"
            echo "shasum -a 256 ${DMG_NAME}"
            echo "\`\`\`"
            echo
            echo "Compare against \`${DMG_NAME}.sha256\` attached to this release."
          } > release_notes.md
          cat release_notes.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Foolscap ${{ steps.version.outputs.tag }}
          body_path: release_notes.md
          generate_release_notes: true
          files: |
            Foolscap-*.dmg
            Foolscap-*.dmg.sha256
